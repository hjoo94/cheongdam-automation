<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>청담봇 모바일 대시보드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #7b8cde;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-bottom: 28px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1.5px solid #333;
      background: #0f0f1a;
      color: #e0e0e0;
      font-size: 15px;
      margin-bottom: 8px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #7b8cde; }
    .fp-hint {
      font-size: 11px;
      color: #666;
      margin-bottom: 16px;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    .btn-primary { background: #7b8cde; color: #fff; }
    .btn-toggle-on  { background: #27ae60; color: #fff; margin-bottom: 12px; }
    .btn-toggle-off { background: #e74c3c; color: #fff; margin-bottom: 12px; }
    .btn-logout { background: #2a2a3e; color: #aaa; font-size: 14px; padding: 10px; }
    .status-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin: 16px 0;
    }
    .badge-on  { background: #1a4a2e; color: #27ae60; }
    .badge-off { background: #4a1a1a; color: #e74c3c; }
    .badge-unknown { background: #2a2a3e; color: #888; }
    .msg { font-size: 13px; color: #e74c3c; margin-top: 10px; text-align: center; min-height: 20px; }
    .section-title { font-size: 13px; color: #888; margin-bottom: 6px; }
    .info-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
    .info-label { color: #888; }
    .info-value { color: #e0e0e0; font-family: monospace; font-size: 12px; }
    .divider { border: none; border-top: 1px solid #2a2a3e; margin: 20px 0; }
    #login-screen, #dashboard-screen { display: none; }
    .spinner { text-align: center; color: #7b8cde; font-size: 13px; margin: 10px 0; }
    .url-hint { font-size: 10px; color: #555; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>

<div class="card">
  <div id="login-screen">
    <h1>청담봇</h1>
    <p class="subtitle">모바일 대시보드</p>
    <input type="password" id="licenseInput" placeholder="라이선스 키 입력" autocomplete="off">
    <input type="text" id="fpInput" placeholder="디바이스 핑거프린트 (선택)" autocomplete="off">
    <p class="fp-hint">※ 기기 바인딩 라이선스는 핑거프린트 입력 필요</p>
    <button class="btn-primary" type="button" onclick="doLogin()">로그인</button>
    <p class="msg" id="loginMsg"></p>
    <p class="url-hint">로컬 서버: 이 페이지 URL에 <code>?local=1</code> 붙이면 API가 127.0.0.1:4300 으로 갑니다.</p>
  </div>

  <div id="dashboard-screen">
    <h1>청담봇</h1>
    <p class="subtitle">모바일 대시보드</p>
    <hr class="divider">

    <p class="section-title">봇 상태</p>
    <div id="statusBadge" class="status-badge badge-unknown">확인 중...</div>
    <div id="spinnerMsg" class="spinner"></div>

    <hr class="divider">

    <button id="toggleBtn" class="btn-toggle-off" type="button" onclick="doToggle()">
      긴급 정지 토글
    </button>
    <button class="btn-logout" type="button" onclick="doLogout()">로그아웃</button>

    <hr class="divider">

    <p class="section-title">연결 정보</p>
    <div class="info-row">
      <span class="info-label">API 베이스</span>
      <span class="info-value" id="serverInfo">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">마지막 갱신</span>
      <span class="info-value" id="lastUpdate">-</span>
    </div>

    <p class="msg" id="dashMsg"></p>
  </div>
</div>

<script>
  const BASE_URL = (() => {
    try {
      const q = new URLSearchParams(window.location.search || '');
      if (q.get('local') === '1') return 'http://127.0.0.1:4300';
    } catch (e) { /* file:// */ }
    return 'http://43.201.84.136:4300';
  })();

  let refreshTimer = null;

  function threadsEmergencyStopFromState(state) {
    if (!state || typeof state !== 'object') return undefined;
    const tp = state.status && state.status.threadsPolicy;
    if (tp && typeof tp.threadsEmergencyStop === 'boolean') {
      return tp.threadsEmergencyStop;
    }
    if (typeof state.threads_emergency_stop === 'boolean') {
      return state.threads_emergency_stop;
    }
    return undefined;
  }

  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('serverInfo').textContent = BASE_URL.replace(/^https?:\/\//, '');
    const token = localStorage.getItem('cdToken');
    if (token) {
      showDashboard();
      fetchState();
    } else {
      showLogin();
    }
  });

  function showLogin() {
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('dashboard-screen').style.display = 'none';
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  }
  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    if (!refreshTimer) {
      refreshTimer = setInterval(fetchState, 10000);
    }
  }

  async function doLogin() {
    const key = document.getElementById('licenseInput').value.trim();
    const fp = document.getElementById('fpInput') ? document.getElementById('fpInput').value.trim() : '';
    const msgEl = document.getElementById('loginMsg');
    msgEl.textContent = '';
    if (!key) { msgEl.textContent = '라이선스 키를 입력하세요.'; return; }

    const body = { licenseKey: key };
    if (fp) body.deviceFingerprint = fp;

    try {
      const res = await fetch(`${BASE_URL}/api/mobile/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        msgEl.textContent = data.error || res.statusText;
        return;
      }
      if (data.ok && data.token) {
        localStorage.setItem('cdToken', data.token);
        showDashboard();
        fetchState();
      } else {
        msgEl.textContent = data.error || '로그인에 실패했습니다.';
      }
    } catch (err) {
      console.error('[Login Error]', err);
      msgEl.textContent = '서버에 연결할 수 없습니다.';
    }
  }

  async function fetchState() {
    const token = localStorage.getItem('cdToken');
    if (!token) { showLogin(); return; }
    const spinner = document.getElementById('spinnerMsg');
    if (spinner) spinner.textContent = '갱신 중...';
    document.getElementById('dashMsg').textContent = '';

    try {
      const res = await fetch(`${BASE_URL}/api/mobile/state/get`, {
        method: 'GET',
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 401 || res.status === 403) {
        doLogout();
        return;
      }
      const data = await res.json().catch(() => ({}));
      if (data.ok) {
        renderState(data.state);
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ko-KR');
      } else {
        document.getElementById('dashMsg').textContent = data.error || '상태 조회 실패';
        renderState(undefined);
      }
    } catch (err) {
      console.error('[State Error]', err);
      document.getElementById('dashMsg').textContent = '상태 조회 실패. 네트워크를 확인하세요.';
    } finally {
      if (spinner) spinner.textContent = '';
    }
  }

  function renderState(state) {
    const badge = document.getElementById('statusBadge');
    const btn = document.getElementById('toggleBtn');
    const stopped = threadsEmergencyStopFromState(state);

    if (stopped === true) {
      badge.className = 'status-badge badge-off';
      badge.textContent = '⛔ 긴급 정지 중';
      btn.className = 'btn-toggle-on';
      btn.textContent = '▶ 봇 재개';
    } else if (stopped === false) {
      badge.className = 'status-badge badge-on';
      badge.textContent = '✅ 정상 운영 중';
      btn.className = 'btn-toggle-off';
      btn.textContent = '⏹ 긴급 정지';
    } else {
      badge.className = 'status-badge badge-unknown';
      badge.textContent = state
        ? '❓ 상태 미확인 (데스크톱 앱이 state/update 하면 표시)'
        : '❓ 상태 없음';
    }
  }

  async function doToggle() {
    const token = localStorage.getItem('cdToken');
    if (!token) { showLogin(); return; }
    const msgEl = document.getElementById('dashMsg');
    msgEl.textContent = '';

    try {
      const res = await fetch(`${BASE_URL}/api/mobile/commands/push`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
        },
        body: JSON.stringify({ command: 'toggle' }),
      });
      if (res.status === 401 || res.status === 403) {
        doLogout();
        return;
      }
      const data = await res.json().catch(() => ({}));
      if (data.ok) {
        setTimeout(() => { fetchState(); }, 1500);
      } else {
        msgEl.textContent = data.error || '명령 실행 실패';
      }
    } catch (err) {
      console.error('[Toggle Error]', err);
      msgEl.textContent = '서버에 연결할 수 없습니다.';
    }
  }

  function doLogout() {
    localStorage.removeItem('cdToken');
    showLogin();
    document.getElementById('licenseInput').value = '';
    const fp = document.getElementById('fpInput');
    if (fp) fp.value = '';
    document.getElementById('loginMsg').textContent = '';
  }
</script>

</body>
</html>
