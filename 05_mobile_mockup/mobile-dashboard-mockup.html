<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>청담봇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #0a0d1a;
      min-height: 100vh;
      color: #e8ecff;
      padding: 16px;
      max-width: 440px;
      margin: 0 auto;
    }
    h1 { font-size: 1.1rem; margin-bottom: 12px; }
    label { display: block; font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #2a3358;
      background: #151929;
      color: #fff;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn-primary { background: linear-gradient(135deg,#7c3aed,#a855f7); color: #fff; }
    .btn-secondary { background: #222b45; color: #aab4e6; }
    .err { color: #f87171; font-size: 13px; margin-top: 8px; white-space: pre-wrap; }
    .card {
      background: #151929;
      border: 1px solid #2a3358;
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .row { margin-top: 6px; }
    .hidden { display: none !important; }
    pre.raw { font-size: 11px; overflow: auto; max-height: 160px; background: #0d1020; padding: 8px; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="auth-panel">
    <h1>청담봇 모바일</h1>
    <label for="licenseKey">라이선스 키</label>
    <input id="licenseKey" type="password" autocomplete="off" placeholder="라이선스 키" />
    <label for="deviceFingerprint">기기 지문 (라이선스에 기기가 묶인 경우 필수)</label>
    <input id="deviceFingerprint" type="text" autocomplete="off" placeholder="비워두면 미등록 라이선스만 가능" />
    <button type="button" class="btn-primary" id="btn-login">로그인</button>
    <div id="auth-error" class="err hidden"></div>
  </div>

  <div id="app-panel" class="hidden">
    <h1>대시보드</h1>
    <button type="button" class="btn-secondary" id="btn-logout">로그아웃</button>
    <div class="card">
      <div class="row"><strong>고객명</strong> <span id="v-customer">—</span></div>
      <div class="row"><strong>앱 버전</strong> <span id="v-version">—</span></div>
      <div class="row"><strong>스레드 긴급중지</strong> <span id="v-stop">—</span></div>
      <div class="row"><strong>기능 토글</strong></div>
      <pre class="raw" id="v-toggles">—</pre>
    </div>
    <button type="button" class="btn-primary" id="btn-toggle">토글 (스레드 긴급중지 반전)</button>
    <div id="app-error" class="err hidden"></div>
  </div>

  <script>
    const BASE_URL = 'http://43.201.84.136:4300';
    const TOKEN_KEY = 'cdToken';

    function showErr(el, msg) {
      if (!msg) {
        el.classList.add('hidden');
        el.textContent = '';
        return;
      }
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function authHeaders() {
      const t = localStorage.getItem(TOKEN_KEY);
      return {
        'Content-Type': 'application/json',
        ...(t ? { Authorization: 'Bearer ' + t } : {}),
      };
    }

    async function api(path, opts) {
      const url = BASE_URL + path;
      const init = {
        method: opts.method || 'GET',
        headers: { ...authHeaders() },
      };
      if (opts.body != null) {
        init.body = JSON.stringify(opts.body);
      } else if (init.method === 'GET') {
        delete init.headers['Content-Type'];
      }
      const res = await fetch(url, init);
      let data = null;
      try {
        data = await res.json();
      } catch (e) {
        console.error('JSON parse', e);
      }
      if (!res.ok) {
        const msg = (data && data.error) || res.status + ' ' + res.statusText;
        throw new Error(msg);
      }
      if (data && data.ok === false) {
        throw new Error(data.error || '요청 실패');
      }
      return data;
    }

    async function doLogin() {
      const licenseKey = document.getElementById('licenseKey').value.trim();
      const deviceFingerprint = document.getElementById('deviceFingerprint').value.trim();
      showErr(document.getElementById('auth-error'), '');
      if (!licenseKey) {
        showErr(document.getElementById('auth-error'), '라이선스 키를 입력하세요.');
        return;
      }
      try {
        const data = await fetch(BASE_URL + '/api/mobile/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ licenseKey, deviceFingerprint }),
        }).then(async (r) => {
          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(j.error || r.statusText);
          return j;
        });
        if (!data.token) throw new Error('토큰이 없습니다.');
        localStorage.setItem(TOKEN_KEY, data.token);
        document.getElementById('auth-panel').classList.add('hidden');
        document.getElementById('app-panel').classList.remove('hidden');
        await refreshState();
      } catch (e) {
        console.error(e);
        showErr(document.getElementById('auth-error'), String(e.message || e));
      }
    }

    async function refreshState() {
      showErr(document.getElementById('app-error'), '');
      try {
        const data = await api('/api/mobile/state/get', { method: 'GET' });
        const st = data.state;
        if (!st) {
          document.getElementById('v-customer').textContent = '(데스크톱 앱이 켜져 상태를 올리면 표시됩니다)';
          document.getElementById('v-version').textContent = '—';
          document.getElementById('v-stop').textContent = '—';
          document.getElementById('v-toggles').textContent = '—';
          return;
        }
        document.getElementById('v-customer').textContent = st.customerName || '—';
        document.getElementById('v-version').textContent = st.appVersion || '—';
        const stop = st.status && st.status.threadsPolicy && st.status.threadsPolicy.threadsEmergencyStop;
        document.getElementById('v-stop').textContent = stop ? 'ON' : 'OFF';
        const tg = st.status && st.status.mobileFeatureToggles;
        document.getElementById('v-toggles').textContent = tg ? JSON.stringify(tg, null, 2) : '—';
      } catch (e) {
        console.error(e);
        showErr(document.getElementById('app-error'), String(e.message || e));
      }
    }

    async function doToggle() {
      showErr(document.getElementById('app-error'), '');
      try {
        await api('/api/mobile/commands/push', {
          method: 'POST',
          body: { command: 'toggle' },
        });
        await refreshState();
      } catch (e) {
        console.error(e);
        showErr(document.getElementById('app-error'), String(e.message || e));
      }
    }

    function doLogout() {
      localStorage.removeItem(TOKEN_KEY);
      document.getElementById('app-panel').classList.add('hidden');
      document.getElementById('auth-panel').classList.remove('hidden');
    }

    let pollTimer = null;
    function startPoll() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(() => {
        if (!localStorage.getItem(TOKEN_KEY)) return;
        if (document.getElementById('app-panel').classList.contains('hidden')) return;
        refreshState().catch(() => {});
      }, 10000);
    }

    document.getElementById('btn-login').addEventListener('click', () => {
      doLogin().then(() => startPoll());
    });
    document.getElementById('btn-logout').addEventListener('click', () => {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
      doLogout();
    });
    document.getElementById('btn-toggle').addEventListener('click', doToggle);

    if (localStorage.getItem(TOKEN_KEY)) {
      document.getElementById('auth-panel').classList.add('hidden');
      document.getElementById('app-panel').classList.remove('hidden');
      refreshState()
        .then(() => startPoll())
        .catch(() => {
          doLogout();
        });
    }
  </script>
</body>
</html>
